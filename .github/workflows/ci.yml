name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  install-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Run linting
        run: npm run lint

  build-and-test:
    needs: install-and-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Build project (frontend & backend)
        run: npm run build
      - name: Start backend in background
        run: |
          PORT=3002 NODE_ENV=development npx tsx packages/backend/src/index.ts &
          BACKEND_PID=$!
          echo "Backend started with PID: $BACKEND_PID"
          # Wait for backend to be ready
          for i in {1..10}; do
            if curl -s http://localhost:3002/health > /dev/null; then
              echo "Backend is ready!"
              break
            fi
            sleep 2
            echo "Waiting for backend... ($i/10)"
          done
          if [ $i -eq 10 ]; then
            echo "Backend failed to start"
            exit 1
          fi
        shell: bash
      - name: Run API smoke tests
        run: npm test
      - name: Cleanup
        if: always()
        run: |
          kill $BACKEND_PID || true
          echo "Backend stopped"

  test-backend:
    needs: install-and-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm install
      - name: Run backend tests
        run: cd packages/backend && NODE_ENV=test npm test
